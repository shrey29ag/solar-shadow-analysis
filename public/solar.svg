<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <linearGradient id="sun-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.3)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)" />
    </linearGradient>
    
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <path d="M50,0 C10,0 0,10 0,50 C0,90 10,100 50,100 C90,100 100,90 100,50 C100,10 90,0 50,0 Z" fill="url(#bg)" />

  <circle cx="35" cy="35" r="22" fill="url(#sun-glow)" />

  <path d="M25 65 L85 90 L65 110 L15 80 Z" fill="#000000" opacity="0.4" filter="url(#soft-shadow)"/>

  <path d="M15 65 L65 40 L85 55 L35 80 Z" fill="url(#glass)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linejoin="round" />

  <line x1="32" y1="56.5" x2="68" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="1" />
  <line x1="48" y1="48.5" x2="85" y2="64" stroke="rgba(255,255,255,0.4)" stroke-width="1" />
</svg>
